                </div>
                <div style={{fontSize:"9px",color:"rgba(245,241,234,0.35)"}}>{brief.subSector||brief.sector||""} · Appetite {brief.appetiteScore||5}/10</div>
                <div style={{fontSize:"9px",color:"rgba(245,241,234,0.3)",marginTop:"3px"}}>Last verified: {brief.lastVerified?fmtD(brief.lastVerified):"Never"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:days>180?B.red:B.amber,lineHeight:1}}>{days}</div>
                <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)"}}>days ago</div>
                <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",marginTop:"4px"}}>{channels}/4 channels active</div>
              </div>
            </div>
          </div>;
        })
      }
      </div>;
    })()}

    {editWatch&&<div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setEditWatch(null)}>
      <div style={S.drawer}>
        <div style={S.dHead}><div style={{fontFamily:"Georgia,serif",fontSize:"16px",color:B.paper}}>{editWatch.id&&(watchList||[]).find(w=>w.id===editWatch.id)?"Edit Watch Entry":"New Watch Entry"}</div><button style={{...S.btnO,color:"rgba(245,241,234,0.35)"}} onClick={()=>setEditWatch(null)}>✕</button></div>
        <div style={S.dBody}>
          <div style={S.dSecT}>Company Details</div>
          <div style={S.r2}><Fld label="Company Name"><input style={S.inp} value={editWatch.company||""} onChange={e=>setEditWatch(p=>({...p,company:e.target.value}))}/></Fld><Fld label="Website"><input style={S.inp} value={editWatch.website||""} onChange={e=>setEditWatch(p=>({...p,website:e.target.value}))}/></Fld></div>
          <div style={S.r2}><Fld label="Sector"><select style={S.sel} value={editWatch.sector||""} onChange={e=>setEditWatch(p=>({...p,sector:e.target.value}))}><option value="">Select...</option>{["Residential","Energy & Infrastructure","Digital & Technology","Commercial & Logistics","Hospitality & Leisure","Healthcare","Environmental"].map(s=><option key={s}>{s}</option>)}</select></Fld><Fld label="Sub-Sector"><input style={S.inp} value={editWatch.subSector||""} onChange={e=>setEditWatch(p=>({...p,subSector:e.target.value}))} placeholder="e.g. BESS Developer, Logistics REIT, QSR Operator"/></Fld></div>
          <div style={S.r2}>
            <Fld label="Status"><select style={S.sel} value={editWatch.status||"watching"} onChange={e=>setEditWatch(p=>({...p,status:e.target.value}))}><option value="watching">Watching</option><option value="warm">Warm — signals emerging</option><option value="hot">Hot — ready to contact</option><option value="graduated">Graduated to full brief</option></select></Fld>
            <Fld label="Priority (1-5)"><input style={S.inp} type="number" min="1" max="5" value={editWatch.priority||3} onChange={e=>setEditWatch(p=>({...p,priority:parseInt(e.target.value)||3}))}/></Fld>
          </div>
          <Fld label="Why are you watching this company?"><textarea style={S.ta} value={editWatch.notes||""} onChange={e=>setEditWatch(p=>({...p,notes:e.target.value}))} placeholder="What signal brought them to your attention? New entrant to UK? Hiring land directors? Press release? LinkedIn post?"/></Fld>
          <div style={{...S.dSecT,marginTop:"14px"}}>Signals Log</div>
          <button style={{...S.btnN,marginBottom:"8px"}} onClick={()=>setEditWatch(p=>({...p,signals:[{id:uid(),date:new Date().toISOString().slice(0,10),signal:"",source:""},...(p.signals||[])]}))}>+ Add Signal</button>
          {(editWatch.signals||[]).map((sig,i)=><div key={sig.id||i} style={{display:"grid",gridTemplateColumns:"110px 1fr auto",gap:"8px",alignItems:"end",marginBottom:"6px"}}>
            <Fld label="Date"><input style={S.inp} type="date" value={sig.date||""} onChange={e=>setEditWatch(p=>({...p,signals:p.signals.map((s,j)=>j===i?{...s,date:e.target.value}:s)}))}/></Fld>
            <Fld label="Signal"><input style={S.inp} value={sig.signal||""} onChange={e=>setEditWatch(p=>({...p,signals:p.signals.map((s,j)=>j===i?{...s,signal:e.target.value}:s)}))} placeholder="e.g. Hired Land Director for North England. Announced 50 new UK sites target. Applied for planning in Sunderland."/></Fld>

function Marketplace({sites,currentUser,dealMakers,onClaim,onOpen}){
  const[mF,setMF]=useState("");const[tF,setTF]=useState("");
  const available=sites.filter(s=>{
    if(s.status!=="available"&&s.status!=="scored")return false;
    if(mF&&s.primaryMarket!==mF)return false;
    if(tF&&s.tier!==tF)return false;
    return true;
  });
  return<div>
    <div style={{...S.card,background:B.navy,borderColor:B.navy,marginBottom:"14px"}}>
      <div style={{fontSize:"9px",letterSpacing:"0.2em",textTransform:"uppercase",color:B.gold,marginBottom:"6px",fontWeight:500}}>Site Marketplace</div>
      <div style={{fontSize:"12px",color:"rgba(245,241,234,0.6)",lineHeight:1.7,fontWeight:300}}>Claim a site to take it through the promotion process. You earn <strong style={{color:B.gold}}>10% of Parcel\u2019s promoted interest</strong> on completion. Once claimed, the site is assigned to you.</div>
    </div>
    <div style={{display:"flex",gap:"8px",marginBottom:"12px",alignItems:"center"}}>
      <select style={{...S.sel,width:"200px"}} value={mF} onChange={e=>setMF(e.target.value)}><option value="">All markets</option>{MARKETS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}</select>
      <select style={{...S.sel,width:"160px"}} value={tF} onChange={e=>setTF(e.target.value)}><option value="">All tiers</option>{TIERS.filter(t=>t.id!=="--").map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>
      <div style={{fontSize:"10px",color:"rgba(245,241,234,0.35)",marginLeft:"4px"}}>{available.length} available</div>
    </div>
    {available.length===0?<div style={{...S.card,textAlign:"center",padding:"40px",color:"rgba(245,241,234,0.3)"}}><div style={{fontSize:"12px",marginBottom:"8px"}}>No available sites match your filters.</div><div style={{fontSize:"10px"}}>New sites appear here as they clear the scoring gate.</div></div>
    :<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{available.map(site=>{
      const pi=parseFloat(site.promotedInterest)||25;const cr=parseFloat(site.commissionRate)||10;const dmPct=(pi*(cr/100)).toFixed(1);const prob=site.probability;
      return<div key={site.id} style={{...S.card,borderLeft:`3px solid ${getMkt(site.primaryMarket).color}`,cursor:"pointer",marginBottom:0}} onClick={()=>onOpen(site)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"5px"}}><span style={{fontFamily:"Georgia,serif",fontSize:"15px",color:B.paper,fontWeight:600}}>{site.ref}</span><TierBadge id={site.tier}/><MktBadge id={site.primaryMarket}/>{(site.secondaryMarkets||[]).map(m=><MktBadge key={m} id={m}/>)}</div>
            <div style={{fontSize:"12px",color:"rgba(245,241,234,0.7)",fontWeight:400,marginBottom:"3px"}}>{site.name||"Site location TBC"}</div>
            <div style={{fontSize:"10px",color:"rgba(245,241,234,0.35)"}}>{site.lpa}{site.area?` \u00b7 ${site.area} acres`:""}</div>
            {prob!=null&&<div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"6px"}}><div style={{width:"60px",height:"4px",background:"rgba(245,241,234,0.1)",borderRadius:"2px"}}><div style={{height:"100%",width:`${prob}%`,background:prob>=70?B.green:prob>=45?B.amber:B.red,borderRadius:"2px"}}/></div><span style={{fontSize:"10px",color:prob>=70?B.green:prob>=45?B.amber:B.red,fontWeight:500}}>{prob}% planning probability</span></div>}
          </div>
          <div style={{textAlign:"right",paddingLeft:"16px"}}>
            <div style={{fontSize:"8px",letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(245,241,234,0.3)",marginBottom:"4px"}}>Your commission</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:"26px",color:B.green,lineHeight:1}}>{dmPct}%</div>
            <div style={{fontSize:"9px",color:"rgba(245,241,234,0.3)"}}>of net proceeds</div>
            <button style={{...S.btnG,marginTop:"10px",padding:"7px 14px"}} onClick={e=>{e.stopPropagation();onClaim(site.id);}}>Claim Site \u2192</button>
          </div>
        </div>
      </div>;
    })}</div>}
  </div>;
}

const INVEST_MILESTONES=[
  "Site identified","Initial appraisal complete","Landowner approached","Site control secured",
  "Planning consultant instructed","Pre-application submitted","Planning application submitted",
  "Planning permission granted","Grid application submitted","Grid connection offer received",
  "SPV incorporated","Investor term sheet received","Investor commitment signed",
  "Development finance agreed","Construction started","Grid connection commissioned",
  "First revenue received","Practical completion","Asset sale completed","Exit complete",
];

function blankInvestProject(n){
  return{
    id:uid(),ref:`PCI-INV-${String(n).padStart(3,"0")}`,name:"",
    assetClass:"bess",status:"identifying",
    linkedSiteRef:"",lpa:"",area:"",gridRef:"",
    headline:"",investmentThesis:"",
    // SPV structure
    parcelEquity:"25",externalEquity:"75",totalCapitalRequired:"",
    fundStructure:"spv_equity",fundingStatus:"Identifying investors",
    targetInvestors:"",
    // Revenue model inputs
    capacity:"",capacityUnit:"MW",
    revenueInputs:{},
    // Returns
    targetIRR:"",targetMultiple:"",targetParcelReturn:"",
    investorReturn:"",paybackYears:"",
    // Timeline
    targetStartDate:"",targetFirstRevenue:"",targetExit:"",
    developmentPeriod:"",holdPeriod:"",
    // Valuations
    estimatedGDV:"",estimatedCost:"",estimatedProfit:"",
    landValue:"",
    // Long-term view
    yr5Value:"",yr10Value:"",yr15Value:"",holdVsSellNote:"",
    // Admin
    milestones:[],notes:"",createdAt:new Date().toISOString().slice(0,10),
  };
}

function InvestProjectDrawer({project,onSave,onDelete,onClose}){
  const[p,setP]=useState(()=>JSON.parse(JSON.stringify(project)));
  const[tab,setTab]=useState("overview");
  const uv=f=>e=>setP(prev=>({...prev,[f]:e.target.value}));
  const ac=INVEST_ASSET_CLASSES.find(a=>a.id===p.assetClass)||INVEST_ASSET_CLASSES[0];
  const rm=REVENUE_MODELS[p.assetClass]||REVENUE_MODELS.bess;
  const st=INVEST_STATUSES.find(s=>s.id===p.status)||INVEST_STATUSES[0];

  const parcelPct=parseFloat(p.parcelEquity)||25;
  const extPct=parseFloat(p.externalEquity)||75;
  const totalCap=parseFloat(p.totalCapitalRequired)||0;
  const parcelCapital=totalCap*(parcelPct/100);
  const extCapital=totalCap*(extPct/100);
  const gdv=parseFloat(p.estimatedGDV)||0;
  const cost=parseFloat(p.estimatedCost)||0;
  const profit=gdv-cost;
  const parcelProfit=profit*(parcelPct/100);

  const addMs=()=>setP(prev=>({...prev,milestones:[...(prev.milestones||[]),{id:uid(),type:"",date:"",done:false,note:""}]}));
  const upMs=(id,f,v)=>setP(prev=>({...prev,milestones:prev.milestones.map(m=>m.id===id?{...m,[f]:v}:m)}));
  const delMs=id=>setP(prev=>({...prev,milestones:prev.milestones.filter(m=>m.id!==id)}));

  const tabs=[{id:"overview",label:"Overview"},{id:"revenue",label:"Revenue Model"},{id:"structure",label:"SPV Structure"},{id:"returns",label:"Returns"},{id:"timeline",label:"Timeline"},{id:"milestones",label:`Milestones (${(p.milestones||[]).length})`},{id:"notes",label:"Notes"}];

  return<div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={S.drawer}>
      {/* Header */}
      <div style={S.dHead}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"16px"}}>{ac.icon}</span>
            <span style={{fontFamily:"Georgia,serif",fontSize:"17px",color:B.paper}}>{p.ref}</span>
            <span style={{...S.badge(ac.color)}}>{ac.label}</span>
            <span style={{...S.badge(st.color)}}>{st.label}</span>
          </div>
          <div style={{fontSize:"10px",color:"rgba(245,241,234,0.35)",marginTop:"2px"}}>{p.name||"Unnamed project"}</div>
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          <button style={S.btnG} onClick={()=>onSave(p)}>Save</button>
          <button style={{...S.btnO,color:"rgba(245,241,234,0.35)"}} onClick={onClose}>\u2715</button>
        </div>
      </div>

      {/* Status bar */}
      <div style={{background:B.navy,padding:"9px 22px",display:"flex",gap:"12px",borderBottom:`1px solid ${B.ruleN}`,flexShrink:0}}>
        <div><label style={S.lbl}>Asset Class</label><select style={{...S.sel,width:"200px"}} value={p.assetClass} onChange={uv("assetClass")}>{INVEST_ASSET_CLASSES.map(a=><option key={a.id} value={a.id}>{a.icon} {a.label}</option>)}</select></div>
        <div><label style={S.lbl}>Status</label><select style={{...S.sel,width:"170px"}} value={p.status} onChange={uv("status")}>{INVEST_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${B.ruleN}`,background:B.navy,flexShrink:0,overflowX:"auto"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 14px",border:"none",background:"transparent",cursor:"pointer",fontSize:"9px",letterSpacing:"0.06em",color:tab===t.id?ac.color:"rgba(245,241,234,0.4)",borderBottom:`2px solid ${tab===t.id?ac.color:"transparent"}`,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",fontWeight:tab===t.id?500:300}}>{t.label}</button>)}
      </div>

      <div style={S.dBody}>

        {/* ── OVERVIEW ── */}
        {tab==="overview"&&<div>
          <div style={S.dSecT}>Project Details</div>
          <div style={S.r2}><Fld label="Project Name"><input style={S.inp} value={p.name} onChange={uv("name")} placeholder="e.g. Cambois BESS Phase 1"/></Fld><Fld label="Linked Site Ref"><input style={S.inp} value={p.linkedSiteRef||""} onChange={uv("linkedSiteRef")} placeholder="e.g. PCI-001"/></Fld></div>
          <div style={S.r3}><Fld label="LPA"><select style={S.sel} value={p.lpa||""} onChange={uv("lpa")}><option value="">Select...</option><optgroup label="NECA">{LPAS_NECA.map(l=><option key={l}>{l}</option>)}</optgroup><optgroup label="TVCA">{LPAS_TVCA.map(l=><option key={l}>{l}</option>)}</optgroup><option>Other</option></select></Fld><Fld label="Area (acres)"><input style={S.inp} type="number" value={p.area||""} onChange={uv("area")}/></Fld><Fld label={`Capacity (${p.capacityUnit||"MW"})`}><input style={S.inp} type="number" value={p.capacity||""} onChange={uv("capacity")}/></Fld></div>
          <Fld label="Investment Thesis"><textarea style={{...S.ta,minHeight:"80px"}} value={p.investmentThesis||""} onChange={uv("investmentThesis")} placeholder="Why this site? Why this asset class? What is the opportunity? What is the risk?"/></Fld>

          {/* Headline returns snapshot */}
          {(p.estimatedGDV||p.targetIRR||p.targetParcelReturn)&&<div style={{background:B.navy,border:`1px solid ${ac.color}30`,borderLeft:`4px solid ${ac.color}`,padding:"14px 16px",marginTop:"12px"}}>
            <div style={{fontSize:"8px",letterSpacing:"0.16em",textTransform:"uppercase",color:ac.color,marginBottom:"10px",fontWeight:500}}>Headline Returns</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px"}}>
              {[
                {l:"Target IRR",v:p.targetIRR?`${p.targetIRR}%`:"—",c:B.green},
                {l:"Equity Multiple",v:p.targetMultiple?`${p.targetMultiple}x`:"—",c:B.gold},
                {l:"Parcel Net Position",v:fmtM(parcelProfit||parseFloat(p.targetParcelReturn)||0),c:"#4ade80"},
                {l:"Total Capital Required",v:fmtM(totalCap),c:B.paper},
              ].map(({l,v,c})=><div key={l}><div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",marginBottom:"3px"}}>{l}</div><div style={{fontFamily:"Georgia,serif",fontSize:"18px",color:c,lineHeight:1}}>{v}</div></div>)}
            </div>
          </div>}
        </div>}

        {/* ── REVENUE MODEL ── */}
        {tab==="revenue"&&<div>
          <div style={{background:B.navy,border:`1px solid ${B.ruleN}`,padding:"12px 14px",marginBottom:"14px"}}>
            <div style={{fontSize:"10px",color:ac.color,fontWeight:500,marginBottom:"4px"}}>{ac.icon} {rm.label}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"6px",fontSize:"9px",color:"rgba(245,241,234,0.35)"}}>
              <span>{rm.opex}</span><span>{rm.lifespan}</span>
            </div>
          </div>
          {rm.streams.map(stream=><div key={stream.id} style={{background:"rgba(245,241,234,0.02)",border:`1px solid ${B.ruleN}`,padding:"12px 14px",marginBottom:"8px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
              <div><div style={{fontSize:"11px",color:B.paper,fontWeight:400}}>{stream.label}</div><div style={{fontSize:"9px",color:"rgba(245,241,234,0.3)",marginTop:"2px"}}>{stream.tip}</div></div>
              <input style={{...S.inp,width:"140px",textAlign:"right"}} value={(p.revenueInputs||{})[stream.id]||""} onChange={e=>setP(prev=>({...prev,revenueInputs:{...(prev.revenueInputs||{}),[stream.id]:e.target.value}}))} placeholder={stream.unit}/>
            </div>
          </div>)}
          <div style={{background:B.navy,padding:"10px 14px",border:`1px solid ${B.ruleN}`,marginTop:"8px"}}>
            <div style={{fontSize:"8px",color:B.gold2,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"4px"}}>Exit Note</div>
            <div style={{fontSize:"10px",color:"rgba(245,241,234,0.5)",lineHeight:1.7}}>{rm.exitNote}</div>
          </div>
          <Fld label="Additional Revenue Notes"><textarea style={{...S.ta,marginTop:"10px"}} value={p.revenueNotes||""} onChange={uv("revenueNotes")} placeholder="Offtaker conversations, PPA heads of terms, CfD eligibility, grid offer details..."/></Fld>
        </div>}

        {/* ── SPV STRUCTURE ── */}
        {tab==="structure"&&<div>
          <div style={S.dSecT}>Fund Structure</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}}>
            {FUND_STRUCTURES.map(fs=><button key={fs.id} onClick={()=>setP(prev=>({...prev,fundStructure:fs.id}))} style={{padding:"8px 14px",border:`1px solid ${p.fundStructure===fs.id?ac.color:B.ruleN}`,background:p.fundStructure===fs.id?`${ac.color}15`:"transparent",color:p.fundStructure===fs.id?ac.color:"rgba(245,241,234,0.4)",fontSize:"9px",letterSpacing:"0.06em",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{fs.label}</button>)}
          </div>
          {FUND_STRUCTURES.find(f=>f.id===p.fundStructure)&&<div style={{padding:"10px 12px",background:"rgba(245,241,234,0.02)",border:`1px solid ${B.ruleN}`,marginBottom:"14px",fontSize:"10px",color:"rgba(245,241,234,0.5)"}}>{FUND_STRUCTURES.find(f=>f.id===p.fundStructure).desc}</div>}

          <div style={S.dSecT}>Capital Structure</div>
          <div style={{background:B.navy,padding:"16px",marginBottom:"12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px",marginBottom:"12px"}}>
              {[
                {l:"Total Capital Required",v:fmtM(totalCap),c:B.paper,sub:"Total project capital"},
                {l:`Parcel Equity (${parcelPct}%)`,v:fmtM(parcelCapital),c:B.gold,sub:"Parcel's capital commitment"},
                {l:`External Capital (${extPct}%)`,v:fmtM(extCapital),c:"#60a5fa",sub:"Co-investor capital"},
              ].map(({l,v,c,sub})=><div key={l}><div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",marginBottom:"3px"}}>{l}</div><div style={{fontFamily:"Georgia,serif",fontSize:"20px",color:c,lineHeight:1}}>{v}</div><div style={{fontSize:"9px",color:"rgba(245,241,234,0.25)",marginTop:"2px"}}>{sub}</div></div>)}
            </div>
            {/* Equity bar */}
            <div style={{height:"8px",background:"rgba(245,241,234,0.08)",borderRadius:"4px",overflow:"hidden",display:"flex"}}>
              <div style={{width:`${parcelPct}%`,background:B.gold,borderRadius:"4px 0 0 4px"}}/>
              <div style={{width:`${extPct}%`,background:"#60a5fa",borderRadius:"0 4px 4px 0"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:"4px",fontSize:"9px",color:"rgba(245,241,234,0.3)"}}>
              <span style={{color:B.gold}}>Parcel {parcelPct}%</span>
              <span style={{color:"#60a5fa"}}>External {extPct}%</span>
            </div>
          </div>
          <div style={S.r3}>
            <Fld label="Total Capital Required (£)"><input style={S.inp} type="number" value={p.totalCapitalRequired||""} onChange={uv("totalCapitalRequired")}/></Fld>
            <Fld label="Parcel Equity (%)"><input style={S.inp} type="number" value={p.parcelEquity} onChange={uv("parcelEquity")} min="1" max="99"/></Fld>
            <Fld label="External Equity (%)"><input style={S.inp} type="number" value={p.externalEquity} onChange={uv("externalEquity")} min="1" max="99"/></Fld>
          </div>
          <Fld label="Target Investors"><textarea style={{...S.ta,minHeight:"50px"}} value={p.targetInvestors||""} onChange={uv("targetInvestors")} placeholder="e.g. Gresham House, Octopus Energy, Downing Renewables, regional family office, institutional infrastructure fund..."/></Fld>
          <Fld label="Funding Status"><input style={S.inp} value={p.fundingStatus||""} onChange={uv("fundingStatus")} placeholder="e.g. Identifying investors, Term sheet received, Heads of terms agreed..."/></Fld>
        </div>}

        {/* ── RETURNS ── */}
        {tab==="returns"&&<div>
          <div style={S.dSecT}>Project Returns</div>
          <div style={S.r2}>
            <Fld label="Estimated GDV / Asset Value (£)"><input style={S.inp} type="number" value={p.estimatedGDV||""} onChange={uv("estimatedGDV")}/></Fld>
            <Fld label="Estimated Total Cost (£)"><input style={S.inp} type="number" value={p.estimatedCost||""} onChange={uv("estimatedCost")}/></Fld>
          </div>
          {(gdv>0&&cost>0)&&<div style={{background:B.navy,padding:"14px",border:`1px solid ${profit>0?"rgba(46,125,50,0.3)":B.ruleN}`,marginBottom:"12px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
              {[
                {l:"Gross Profit",v:fmtM(profit),c:profit>0?B.green:B.red},
                {l:`Parcel Share (${parcelPct}%)`,v:fmtM(parcelProfit),c:B.gold},
                {l:"Profit on Cost",v:`${cost>0?Math.round((profit/cost)*100):0}%`,c:profit/cost>0.15?B.green:B.amber},
              ].map(({l,v,c})=><div key={l}><div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",marginBottom:"3px"}}>{l}</div><div style={{fontFamily:"Georgia,serif",fontSize:"20px",color:c,lineHeight:1}}>{v}</div></div>)}
            </div>
          </div>}
          <div style={S.r3}>
            <Fld label="Target IRR (%)"><input style={S.inp} type="number" value={p.targetIRR||""} onChange={uv("targetIRR")} placeholder="e.g. 18"/></Fld>
            <Fld label="Target Equity Multiple"><input style={S.inp} value={p.targetMultiple||""} onChange={uv("targetMultiple")} placeholder="e.g. 2.5x"/></Fld>
            <Fld label="Payback Period (years)"><input style={S.inp} type="number" value={p.paybackYears||""} onChange={uv("paybackYears")}/></Fld>
          </div>
          <div style={S.r2}>
            <Fld label="Target Parcel Net Return (£)"><input style={S.inp} type="number" value={p.targetParcelReturn||""} onChange={uv("targetParcelReturn")}/></Fld>
            <Fld label="Investor Return Target"><input style={S.inp} value={p.investorReturn||""} onChange={uv("investorReturn")} placeholder="e.g. 12% IRR + 1.8x multiple"/></Fld>
          </div>

          <div style={S.dSecT}>Long-Term Value</div>
          <div style={S.r3}>
            <Fld label="Year 5 Value (£)"><input style={S.inp} type="number" value={p.yr5Value||""} onChange={uv("yr5Value")}/></Fld>
            <Fld label="Year 10 Value (£)"><input style={S.inp} type="number" value={p.yr10Value||""} onChange={uv("yr10Value")}/></Fld>
            <Fld label="Year 15 Value (£)"><input style={S.inp} type="number" value={p.yr15Value||""} onChange={uv("yr15Value")}/></Fld>
          </div>
          {(p.yr5Value||p.yr10Value||p.yr15Value)&&<div style={{background:B.navy,padding:"12px 14px",border:`1px solid ${B.ruleN}`,marginBottom:"10px"}}>
            <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",marginBottom:"8px",letterSpacing:"0.12em",textTransform:"uppercase"}}>Long-Term Value Trajectory</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:"16px",height:"50px"}}>
              {[{l:"Today",v:parseFloat(p.estimatedGDV)||0},{l:"Yr 5",v:parseFloat(p.yr5Value)||0},{l:"Yr 10",v:parseFloat(p.yr10Value)||0},{l:"Yr 15",v:parseFloat(p.yr15Value)||0}].map(({l,v},i)=>{
                const allVals=[parseFloat(p.estimatedGDV)||0,parseFloat(p.yr5Value)||0,parseFloat(p.yr10Value)||0,parseFloat(p.yr15Value)||0].filter(x=>x>0);
                const maxV=Math.max(...allVals,1);
                const h=v>0?Math.round((v/maxV)*40)+10:4;
                return<div key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",flex:1}}>
                  <div style={{fontSize:"9px",color:ac.color}}>{v>0?fmtM(v):""}</div>
                  <div style={{width:"100%",height:`${h}px`,background:v>0?`${ac.color}50`:"rgba(245,241,234,0.05)",border:`1px solid ${v>0?ac.color:B.ruleN}`,transition:"height 0.3s"}}/>
                  <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)"}}>{l}</div>
                </div>;
              })}
            </div>
          </div>}
          <Fld label="Hold vs Sell Analysis"><textarea style={S.ta} value={p.holdVsSellNote||""} onChange={uv("holdVsSellNote")} placeholder="Analysis of hold vs sell decision. Income yield vs capital event. Tax considerations. Market timing. Investor preference."/></Fld>
        </div>}

        {/* ── TIMELINE ── */}
        {tab==="timeline"&&<div>
          <div style={S.dSecT}>Project Timeline</div>
          <div style={S.r2}>
            <Fld label="Target Start Date"><input style={S.inp} type="date" value={p.targetStartDate||""} onChange={uv("targetStartDate")}/></Fld>
            <Fld label="Target First Revenue"><input style={S.inp} type="date" value={p.targetFirstRevenue||""} onChange={uv("targetFirstRevenue")}/></Fld>
          </div>
          <div style={S.r2}>
            <Fld label="Development Period"><input style={S.inp} value={p.developmentPeriod||""} onChange={uv("developmentPeriod")} placeholder="e.g. 18 months construction"/></Fld>
            <Fld label="Target Exit / Hold Period"><input style={S.inp} value={p.holdPeriod||""} onChange={uv("holdPeriod")} placeholder="e.g. Hold 10 years then sell to pension fund"/></Fld>
          </div>
          <Fld label="Target Exit Date"><input style={S.inp} type="date" value={p.targetExit||""} onChange={uv("targetExit")}/></Fld>

          {/* Timeline visual */}
          {(p.targetStartDate||p.targetFirstRevenue||p.targetExit)&&<div style={{background:B.navy,padding:"14px",border:`1px solid ${B.ruleN}`,marginTop:"12px"}}>
            <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"10px"}}>Timeline</div>
            {[
              {l:"Site Control",d:p.targetStartDate,c:"#60a5fa"},
              {l:"First Revenue",d:p.targetFirstRevenue,c:B.green},
              {l:"Exit / Maturity",d:p.targetExit,c:B.gold},
            ].filter(x=>x.d).map(({l,d,c})=><div key={l} style={{display:"flex",gap:"12px",padding:"6px 0",borderBottom:`1px solid ${B.ruleN}`,alignItems:"center"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",background:c,flexShrink:0}}/>
              <div style={{fontSize:"11px",color:B.paper,minWidth:"120px"}}>{l}</div>
              <div style={{fontSize:"11px",color:c}}>{fmtD(d)}</div>
            </div>)}
            {p.targetStartDate&&p.targetExit&&<div style={{marginTop:"8px",fontSize:"9px",color:"rgba(245,241,234,0.3)"}}>
              Total project life: {Math.round((new Date(p.targetExit)-new Date(p.targetStartDate))/(1000*60*60*24*365.25)*10)/10} years
            </div>}
          </div>}
        </div>}

        {/* ── MILESTONES ── */}
        {tab==="milestones"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}><div style={S.dSecT}>Project Milestones</div><button style={S.btnN} onClick={addMs}>+ Milestone</button></div>
          {(p.milestones||[]).length===0&&<div style={{fontSize:"11px",color:"rgba(245,241,234,0.3)",padding:"14px 0"}}>No milestones yet.</div>}
          {(p.milestones||[]).map(m=>{const ov=!m.done&&m.date&&new Date(m.date)<new Date();return<div key={m.id} style={{padding:"10px",background:m.done?B.greenP:ov?B.redP:"rgba(245,241,234,0.02)",border:`1px solid ${m.done?"rgba(46,125,50,0.18)":ov?"rgba(185,28,28,0.18)":B.ruleN}`,marginBottom:"6px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 110px auto",gap:"8px",alignItems:"end",marginBottom:"6px"}}>
              <Fld label="Milestone"><select style={S.sel} value={m.type} onChange={e=>upMs(m.id,"type",e.target.value)}><option value="">Select...</option>{INVEST_MILESTONES.map(t=><option key={t}>{t}</option>)}</select></Fld>
              <Fld label="Date"><input style={S.inp} type="date" value={m.date||""} onChange={e=>upMs(m.id,"date",e.target.value)}/></Fld>
              <div style={{display:"flex",gap:"5px",alignItems:"center",paddingTop:"17px"}}><label style={{fontSize:"9px",color:"rgba(245,241,234,0.4)",display:"flex",gap:"4px",alignItems:"center"}}><input type="checkbox" checked={m.done} onChange={e=>upMs(m.id,"done",e.target.checked)} style={{accentColor:B.green}}/>Done</label><button style={S.btnD} onClick={()=>delMs(m.id)}>\u2715</button></div>
            </div>
            <input style={S.inp} value={m.note||""} onChange={e=>upMs(m.id,"note",e.target.value)} placeholder="Note..."/>
          </div>;})}
        </div>}

        {/* ── NOTES ── */}
        {tab==="notes"&&<div>
          <div style={S.dSecT}>Project Notes</div>
          <textarea style={{...S.ta,minHeight:"180px"}} value={p.notes||""} onChange={uv("notes")} placeholder="Investor conversations, planning updates, grid intelligence, landowner notes, risk register, next actions..."/>
          <div style={{...S.dSecT,color:B.red,marginTop:"16px"}}>Danger Zone</div>

function ParcelInvest({projects,onSave,onDelete}){
  const[selected,setSelected]=useState(null);
  const[adding,setAdding]=useState(false);
  const nextRef=projects.length+1;

  const activeProjects=projects.filter(p=>!["exited","onhold"].includes(p.status));
  const totalCapital=projects.reduce((a,p)=>a+(parseFloat(p.totalCapitalRequired)||0),0);
  const totalParcelPos=projects.reduce((a,p)=>{const gdv=parseFloat(p.estimatedGDV)||0;const cost=parseFloat(p.estimatedCost)||0;const pct=(parseFloat(p.parcelEquity)||25)/100;return a+(gdv-cost)*pct;},0);
  const totalParcelCapital=projects.reduce((a,p)=>{const cap=parseFloat(p.totalCapitalRequired)||0;const pct=(parseFloat(p.parcelEquity)||25)/100;return a+cap*pct;},0);

  return<div>
    {/* Portfolio stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"14px"}}>
      {[
        {n:projects.length,  l:"Total Projects",    sub:`${activeProjects.length} active`,         c:"#818cf8"},
        {n:fmtM(totalCapital),l:"Total Capital",    sub:"All projects combined",                    c:B.gold},
        {n:fmtM(totalParcelCapital),l:"Parcel Capital", sub:"Parcel's share of equity",             c:B.amber},
        {n:fmtM(totalParcelPos),l:"Parcel Net Position",sub:"Projected across all projects",       c:"#4ade80"},
      ].map(({n,l,sub,c},i)=><div key={i} style={{background:B.navy2,border:`1px solid ${B.ruleN}`,borderTop:`3px solid ${c}`,padding:"12px 14px"}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:"20px",color:c,lineHeight:1,marginBottom:"3px"}}>{n}</div>
        <div style={{fontSize:"8px",letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(245,241,234,0.35)"}}>{l}</div>
        <div style={{fontSize:"9px",color:"rgba(245,241,234,0.25)",marginTop:"2px"}}>{sub}</div>
      </div>)}
    </div>

    {/* Add button */}
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"12px"}}>
      <button style={S.btnG} onClick={()=>{setSelected(blankInvestProject(nextRef));setAdding(true);}}>+ New Invest Project</button>
    </div>

    {/* Empty state */}
    {projects.length===0&&<div style={{...S.card,textAlign:"center",padding:"48px"}}>
      <div style={{fontSize:"28px",marginBottom:"12px"}}>\u25c6</div>
      <div style={{fontFamily:"Georgia,serif",fontSize:"18px",color:B.paper,marginBottom:"8px"}}>Parcel Invest</div>
      <div style={{fontSize:"11px",color:"rgba(245,241,234,0.4)",marginBottom:"20px",maxWidth:"400px",margin:"0 auto 20px",lineHeight:1.7}}>Stream 2 direct development pipeline. BESS, solar, carbon credits, industrial sites. External investment, Parcel retains SPV equity.</div>
      <button style={S.btnG} onClick={()=>{setSelected(blankInvestProject(1));setAdding(true);}}>Add First Project \u2192</button>
    </div>}

    {/* Project grid */}
    {projects.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
      {projects.map(proj=>{
        const ac2=INVEST_ASSET_CLASSES.find(a=>a.id===proj.assetClass)||INVEST_ASSET_CLASSES[0];
        const st2=INVEST_STATUSES.find(s=>s.id===proj.status)||INVEST_STATUSES[0];
        const gdv2=parseFloat(proj.estimatedGDV)||0;
        const cost2=parseFloat(proj.estimatedCost)||0;
        const pct2=(parseFloat(proj.parcelEquity)||25)/100;
        const parcelPos=(gdv2-cost2)*pct2;
        const cap2=parseFloat(proj.totalCapitalRequired)||0;
        const done=(proj.milestones||[]).filter(m=>m.done).length;
        const total2=(proj.milestones||[]).length;
        return<div key={proj.id} style={{background:B.navy2,border:`1px solid ${B.ruleN}`,borderLeft:`4px solid ${ac2.color}`,padding:"16px",cursor:"pointer"}} onClick={()=>{setSelected(proj);setAdding(false);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
            <div>
              <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"4px"}}>
                <span style={{fontSize:"14px"}}>{ac2.icon}</span>
                <span style={{fontFamily:"Georgia,serif",fontSize:"14px",color:B.paper}}>{proj.ref}</span>
                <span style={S.badge(ac2.color)}>{ac2.label}</span>
                <span style={S.badge(st2.color)}>{st2.label}</span>
              </div>
              <div style={{fontSize:"12px",color:"rgba(245,241,234,0.7)",fontWeight:400}}>{proj.name||"Unnamed project"}</div>
              <div style={{fontSize:"9px",color:"rgba(245,241,234,0.35)",marginTop:"2px"}}>{proj.area?`${proj.area} acres`:""}{proj.capacity?` \u00b7 ${proj.capacity}${proj.capacityUnit||"MW"}`:""}{proj.lpa?` \u00b7 ${proj.lpa}`:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:"18px",color:"#4ade80",lineHeight:1}}>{parcelPos>0?fmtM(parcelPos):"—"}</div>
              <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)"}}>Parcel position</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"10px",paddingTop:"10px",borderTop:`1px solid ${B.ruleN}`}}>
            {[
              {l:"Total Capital",v:fmtM(cap2)},
              {l:"Target IRR",v:proj.targetIRR?`${proj.targetIRR}%`:"—"},
              {l:"Parcel Equity",v:`${proj.parcelEquity||25}%`},
            ].map(({l,v})=><div key={l}><div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)"}}>{l}</div><div style={{fontSize:"11px",color:B.paper,marginTop:"1px"}}>{v}</div></div>)}
          </div>
          {total2>0&&<div style={{marginTop:"8px"}}>
            <div style={{height:"3px",background:"rgba(245,241,234,0.08)",borderRadius:"2px"}}><div style={{height:"100%",width:`${Math.round((done/total2)*100)}%`,background:ac2.color,borderRadius:"2px"}}/></div>
            <div style={{fontSize:"8px",color:"rgba(245,241,234,0.25)",marginTop:"3px"}}>{done}/{total2} milestones</div>
          </div>}
        </div>;
      })}
    </div>}

    {selected&&<InvestProjectDrawer project={selected} onSave={p=>{onSave(p);setSelected(null);setAdding(false);}} onDelete={id=>{onDelete(id);setSelected(null);}} onClose={()=>{setSelected(null);setAdding(false);}}/>}
  </div>;
}

function Intelligence({sites,dealMakers,briefs}){
  const active=sites.filter(s=>!["dead","onhold"].includes(s.status)&&s.tier!=="--");
  const lrhr=sites.filter(s=>{const fc=calcForecast(s);return fc.lowRiskHighReward||s.flaggedForDevelopment;});
  const flagged=sites.filter(s=>s.flaggedForDevelopment);

  // Portfolio totals — mid estimates, probability-weighted
  const totGV=active.reduce((a,s)=>a+calcForecast(s).gvMid,0);
  const totParcel=active.reduce((a,s)=>a+calcForecast(s).parcelNetMid,0);
  const totExpected=active.reduce((a,s)=>a+calcForecast(s).expectedValueMid,0);
  const totDM=active.reduce((a,s)=>a+calcForecast(s).dmCommMid,0);
  const totCosts=active.reduce((a,s)=>a+calcForecast(s).costs,0);
  const totProb=active.length>0?Math.round(active.reduce((a,s)=>a+(s.probability||0),0)/active.length):0;

  // Pipeline by status
  const byStatus=SITE_STATUSES.map(st=>({
    ...st,
    sites:active.filter(s=>s.status===st.id),
    value:active.filter(s=>s.status===st.id).reduce((a,s)=>a+calcForecast(s).expectedValueMid,0),
  })).filter(x=>x.sites.length>0);

  // Top opportunities by expected value
  const topSites=[...active].sort((a,z)=>calcForecast(z).expectedValueMid-calcForecast(a).expectedValueMid).slice(0,8);

  // Market breakdown
  const byMkt=MARKETS.map(m=>({
    ...m,
    count:active.filter(s=>s.primaryMarket===m.id).length,
    value:active.filter(s=>s.primaryMarket===m.id).reduce((a,s)=>a+calcForecast(s).expectedValueMid,0),
  })).filter(x=>x.count>0);

  return<div>
    {/* SITE-FINDING FEE PANEL — near-term cash opportunities */}
    {(()=>{
      const feeOps=briefs.filter(b=>b.active&&b.finderFeeAvailable);

      const feeMatches=feeOps.flatMap(b=>sites.filter(s=>(s.status==="available"||s.status==="scored")&&matchBrief(b,s)>=60).map(s=>({b,s,pct:matchBrief(b,s)})));
      return<div style={{background:"rgba(46,125,50,0.06)",border:"1px solid rgba(46,125,50,0.25)",borderLeft:"4px solid #2e7d32",padding:"14px 16px",marginBottom:"14px"}}>
        <div style={{fontSize:"9px",letterSpacing:"0.18em",textTransform:"uppercase",color:B.green,fontWeight:500,marginBottom:"4px"}}>★ Site-Finding Fee Opportunities — Immediate Cash</div>
        <div style={{fontSize:"10px",color:"rgba(245,241,234,0.5)",marginBottom:"10px",lineHeight:1.6}}>{feeOps.length} active buyer{feeOps.length!==1?"s":""} offering finder fees. These generate cash on introduction — no promotion required, no planning risk, no deferred carry. Priority for early pipeline.</div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div style={{fontSize:"11px",color:B.paper,fontWeight:400,marginBottom:"2px"}}>{b.developerName}</div><div style={{fontSize:"9px",color:B.green,fontWeight:500}}>{b.typicalFinderFee?`£${parseInt(b.typicalFinderFee).toLocaleString()} finder fee`:b.notes?.match(/£[\d,]+(?:,\d{3})*(?:\.\d+)?/)?.[0]||"Fee available"}</div><div style={{fontSize:"9px",color:"rgba(245,241,234,0.35)",marginTop:"2px"}}>{b.subSector||b.markets.map(m=>getMkt(m).label).join(", ")}</div></div>
              <div style={{textAlign:"right",paddingLeft:"8px"}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:"18px",color:feeMatches.filter(x=>x.b.id===b.id).length>0?B.blue:"rgba(245,241,234,0.2)",lineHeight:1}}>{feeMatches.filter(x=>x.b.id===b.id).length}</div>
                <div style={{fontSize:"8px",color:"rgba(245,241,234,0.3)"}}>matching</div>

                  <div style={{fontSize:"9px",color:"rgba(245,241,234,0.4)",marginTop:"2px"}}>{fmtM(dmExpected)} expected</div>
                </div>
              </div>
            </div>;
          })}
          <div style={{paddingTop:"10px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:"9px",color:"rgba(245,241,234,0.3)"}}>Total DM commission pool</span>
            <span style={{fontSize:"11px",color:B.gold,fontFamily:"Georgia,serif"}}>{fmtM(totDM)}</span>
          </div>
        </div>}
      </div>
    </div>

    {/* PORTFOLIO PROBABILITY DISCLAIMER */}
    <div style={{marginTop:"12px",padding:"10px 14px",background:"rgba(245,241,234,0.02)",border:`1px solid ${B.ruleN}`,fontSize:"9px",color:"rgba(245,241,234,0.25)",lineHeight:1.7}}>
      Forecast values are indicative. Gross land value based on market benchmarks for {active.length} active sites. Figures use probability-weighted midpoint estimates. Actual values depend on planning outcomes, market conditions, and negotiated sale prices. Update land value estimates per site as market evidence develops.
    </div>
  </div>;
}

// ─── NEW SITE FLOW ────────────────────────────────────────────────────────────
function NewSiteFlow({nextId,onSave,onCancel}){
  const[phase,setPhase]=useState(1);
  const[site,setSite]=useState(()=>blankSite(nextId));
  const handleScoreComplete=data=>{setSite(p=>({...p,...data}));setPhase(3);};
  if(phase===1) return<div>
    <div style={{...S.card,borderColor:`${B.gold}30`,background:"rgba(201,166,107,0.04)",marginBottom:"16px"}}><div style={{fontSize:"9px",letterSpacing:"0.18em",textTransform:"uppercase",color:B.gold,marginBottom:"6px",fontWeight:500}}>Step 1 of 2 \u2014 Site Details</div><div style={{fontSize:"12px",color:"rgba(245,241,234,0.5)",lineHeight:1.75}}>Enter basic site details then score it. The score result creates the pipeline entry automatically with tier, probability, and asset class data pre-filled.</div></div>
    <div style={S.card}>
      <div style={S.dSecT}>Site Details</div>
      <div style={S.r2}><Fld label="Site Name / Address"><input style={S.inp} value={site.name} onChange={e=>setSite(p=>({...p,name:e.target.value}))} placeholder="e.g. Land south of Yarm Road"/></Fld><Fld label="Reference"><input style={S.inp} value={site.ref} onChange={e=>setSite(p=>({...p,ref:e.target.value}))}/></Fld></div>
      <div style={S.r3}><Fld label="Stream"><select style={S.sel} value={site.stream} onChange={e=>setSite(p=>({...p,stream:e.target.value}))}><option value="S1">Stream 1 \u2014 Promotion</option><option value="S2">Stream 2 \u2014 Development</option></select></Fld><Fld label="Primary Market"><select style={S.sel} value={site.primaryMarket} onChange={e=>setSite(p=>({...p,primaryMarket:e.target.value}))}>{MARKETS.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}</select></Fld><Fld label="Area (acres)"><input style={S.inp} type="number" value={site.area} onChange={e=>setSite(p=>({...p,area:e.target.value}))} placeholder="e.g. 12"/></Fld></div>
      <div style={S.r2}><Fld label="LPA"><select style={S.sel} value={site.lpa} onChange={e=>setSite(p=>({...p,lpa:e.target.value}))}><option value="">Select...</option><optgroup label="NECA">{LPAS_NECA.map(l=><option key={l}>{l}</option>)}</optgroup><optgroup label="TVCA">{LPAS_TVCA.map(l=><option key={l}>{l}</option>)}</optgroup><option>Other</option></select></Fld><Fld label="Current Use"><input style={S.inp} value={site.currentUse} onChange={e=>setSite(p=>({...p,currentUse:e.target.value}))} placeholder="e.g. Agricultural \u2014 arable"/></Fld></div>
    </div>
    <div style={{display:"flex",gap:"8px"}}><button style={S.btnO} onClick={onCancel}>Cancel</button><button style={{...S.btnG,flex:1}} onClick={()=>setPhase(2)}>Score This Site \u2192</button></div>
  </div>;
  if(phase===2) return<div>
    <div style={{...S.card,borderColor:`${B.gold}30`,background:"rgba(201,166,107,0.04)",marginBottom:"16px"}}><div style={{fontSize:"9px",letterSpacing:"0.18em",textTransform:"uppercase",color:B.gold,marginBottom:"4px",fontWeight:500}}>Step 2 of 2 \u2014 Scoring: {site.ref}{site.name?` \u00b7 ${site.name}`:""}</div><div style={{fontSize:"11px",color:"rgba(245,241,234,0.4)"}}>Select asset classes and complete binary scoring. The result creates the pipeline entry.</div></div>
    <ScoringWizard site={site} onComplete={handleScoreComplete} onCancel={()=>setPhase(1)}/>
  </div>;
  if(phase===3){const res=computeResults(site.scores||{},site.selectedAssets||[],site.consultantOverride||"0");return<div>
    <div style={{...S.card,borderColor:`${res.prob.band.color}30`,borderLeft:`4px solid ${res.prob.band.color}`,marginBottom:"14px"}}>
      <div style={{fontSize:"9px",letterSpacing:"0.18em",textTransform:"uppercase",color:res.prob.band.color,marginBottom:"6px",fontWeight:500}}>Score Complete \u2014 {site.ref}</div>
      <div style={{display:"flex",gap:"24px",alignItems:"center"}}>
        <div><div style={{fontFamily:"Georgia,serif",fontSize:"48px",color:res.prob.band.color,lineHeight:0.9}}>{res.prob.final}<span style={{fontSize:"22px",opacity:0.6}}>%</span></div><div style={{fontSize:"11px",color:"rgba(245,241,234,0.6)",marginTop:"5px"}}>{res.prob.band.label}</div></div>
        <div><TierBadge id={res.tier.id}/><div style={{fontFamily:"Georgia,serif",fontSize:"22px",color:res.tier.color,marginTop:"6px"}}>{res.tot}/{res.max}</div></div>
        <div style={{flex:1,fontSize:"11px",color:"rgba(245,241,234,0.5)",lineHeight:1.7}}>{res.prob.band.desc}</div>
      </div>
    </div>
    <div style={S.card}><div style={S.dSecT}>Adding to pipeline as</div><div style={S.r3}><div><div style={S.lbl}>Reference</div><div style={{fontSize:"13px",color:B.paper}}>{site.ref}</div></div><div><div style={S.lbl}>LPA</div><div style={{fontSize:"12px",color:"rgba(245,241,234,0.7)"}}>{site.lpa||"\u2014"}</div></div><div><div style={S.lbl}>Status</div><div style={{fontSize:"12px",color:B.blue}}>Available</div></div></div></div>
    <div style={{display:"flex",gap:"8px"}}><button style={S.btnO} onClick={()=>setPhase(2)}>\u2190 Re-Score</button><button style={{...S.btnG,flex:1}} onClick={()=>{onSave({...site,status:"available"});onCancel();}}>Add to Pipeline \u2192</button></div>
  </div>;}
  return null;
}

// ─── USER SWITCHER ────────────────────────────────────────────────────────────
function UserSwitcher({state,onSwitch}){
  const[open,setOpen]=useState(false);
  const cu=state.currentUser;const dm=state.dealMakers.find(d=>d.id===cu.id);
  return<div style={{position:"relative"}}>
    <button style={{...S.btnO,fontSize:"9px",display:"flex",alignItems:"center",gap:"5px"}} onClick={()=>setOpen(o=>!o)}>
      <span style={{color:cu.role==="admin"?B.gold:B.blue}}>\u25cf</span>{cu.role==="admin"?"Parcel Admin":dm?.name||"Deal Maker"} \u25be
    </button>
    {open&&<div style={{position:"absolute",top:"100%",right:0,background:B.navy2,border:`1px solid ${B.ruleN}`,minWidth:"200px",zIndex:200,boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
      <div style={{padding:"8px 12px",fontSize:"8px",letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(245,241,234,0.25)",borderBottom:`1px solid ${B.ruleN}`}}>Switch View (Demo)</div>
      <div style={{padding:"7px 12px",fontSize:"11px",color:cu.role==="admin"?B.gold:"rgba(245,241,234,0.5)",background:cu.role==="admin"?"rgba(201,166,107,0.08)":"transparent",cursor:"pointer"}} onClick={()=>{onSwitch({id:"admin_1",role:"admin",name:"Parcel Admin"});setOpen(false);}}>&#9672; Parcel Admin</div>
      {state.dealMakers.map(d=><div key={d.id} style={{padding:"7px 12px",fontSize:"11px",color:cu.id===d.id?B.blue:"rgba(245,241,234,0.5)",background:cu.id===d.id?"rgba(26,82,118,0.1)":"transparent",cursor:"pointer"}} onClick={()=>{onSwitch({id:d.id,role:"dealmaker",name:d.name});setOpen(false);}}>&#9675; {d.name}</div>)}
      {state.dealMakers.length===0&&<div style={{padding:"7px 12px",fontSize:"10px",color:"rgba(245,241,234,0.25)"}}>Register a deal maker to switch view</div>}
    </div>}
  </div>;
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const[state,setState]=useState(()=>load());
  const[view,setView]=useState("dashboard");
  const[selectedSite,setSelectedSite]=useState(null);
  const[addingNew,setAddingNew]=useState(false);

  // Note: data persists during session only — connect Supabase in Phase 4 for full persistence

  const isAdmin=state.currentUser.role==="admin";
  const saveSite=useCallback(site=>{setState(p=>({...p,sites:p.sites.find(x=>x.id===site.id)?p.sites.map(x=>x.id===site.id?site:x):[...p.sites,site],nextId:p.sites.find(x=>x.id===site.id)?p.nextId:p.nextId+1}));setSelectedSite(null);},[]);
  const deleteSite=useCallback(id=>setState(p=>({...p,sites:p.sites.filter(x=>x.id!==id)})),[]);
  const claimSite=useCallback(id=>{const dm=state.dealMakers.find(d=>d.id===state.currentUser.id);if(!dm)return;setState(p=>({...p,sites:p.sites.map(s=>s.id===id?{...s,claimedBy:dm.id,claimedAt:new Date().toISOString().slice(0,10),status:"claimed"}:s)}));},[state.currentUser,state.dealMakers]);
  const unclaimSite=useCallback(id=>setState(p=>({...p,sites:p.sites.map(s=>s.id===id?{...s,claimedBy:null,claimedAt:null,status:"available"}:s)})),[]);
  const saveDM=useCallback(dm=>setState(p=>({...p,dealMakers:p.dealMakers.find(x=>x.id===dm.id)?p.dealMakers.map(x=>x.id===dm.id?dm:x):[...p.dealMakers,dm]})),[]);
  const deleteDM=useCallback(id=>setState(p=>({...p,dealMakers:p.dealMakers.filter(x=>x.id!==id),sites:p.sites.map(s=>s.claimedBy===id?{...s,claimedBy:null,status:"available"}:s)})),[]);
  const saveBrief=useCallback(b=>setState(p=>({...p,briefs:p.briefs.find(x=>x.id===b.id)?p.briefs.map(x=>x.id===b.id?b:x):[...p.briefs,b]})),[]);
  const deleteBrief=useCallback(id=>setState(p=>({...p,briefs:p.briefs.filter(x=>x.id!==id)})),[]);
  const saveInvest=useCallback(proj=>setState(p=>({...p,investProjects:p.investProjects.find(x=>x.id===proj.id)?p.investProjects.map(x=>x.id===proj.id?proj:x):[...p.investProjects,proj],nextInvestId:p.investProjects.find(x=>x.id===proj.id)?p.nextInvestId:p.nextInvestId+1})),[]);
  const deleteInvest=useCallback(id=>setState(p=>({...p,investProjects:p.investProjects.filter(x=>x.id!==id)})),[]);
  const saveWatch=useCallback(w=>setState(p=>({...p,watchList:p.watchList.find(x=>x.id===w.id)?p.watchList.map(x=>x.id===w.id?w:x):[...p.watchList,w]})),[]);
  const deleteWatch=useCallback(id=>setState(p=>({...p,watchList:p.watchList.filter(x=>x.id!==id)})),[]);

  const adminNav=[{id:"dashboard",label:"Dashboard",icon:"\u25c8"},{id:"intelligence",label:"Intelligence",icon:"\u2605"},{id:"pipeline",label:"Pipeline",icon:"\u229e"},{id:"score",label:"Score New Site",icon:"\u25ce"},{id:"briefs",label:"Buyer Briefs",icon:"\u25e7"},{id:"dealmakers",label:"Deal Makers",icon:"\u2299"},{id:"invest",label:"Parcel Invest",icon:"\u25c6"}];
  const dmNav=[{id:"dashboard",label:"Dashboard",icon:"\u25c8"},{id:"marketplace",label:"Site Marketplace",icon:"\u229e"},{id:"pipeline",label:"My Sites",icon:"\u25ce"},{id:"briefs",label:"My Briefs",icon:"\u25e7"}];
  const nav=isAdmin?adminNav:dmNav;
  const titles={dashboard:"Dashboard",intelligence:"Portfolio Intelligence",pipeline:isAdmin?"Site Pipeline":"My Sites",score:"Score New Site",briefs:"Buyer Briefs",dealmakers:"Deal Makers",marketplace:"Site Marketplace",invest:"Parcel Invest"};

  return<div style={S.app}>
    <div style={S.sb}>
      <div style={S.sbTop}><div style={S.sbMark}>Parcel<span style={S.sbDot}>.</span></div><div style={S.sbSub}>Land & Development</div></div>
      <div style={{flex:1,paddingTop:"8px",overflowY:"auto"}}>
        <div style={S.sbSecLbl}>{isAdmin?"Admin":"Deal Maker"}</div>
        {nav.map(item=><button key={item.id} style={S.sbItem(view===item.id&&!addingNew)} onClick={()=>{setView(item.id);setAddingNew(false);setSelectedSite(null);}}>
          <span style={{fontSize:"13px"}}>{item.icon}</span>
          <span style={{flex:1}}>{item.label}</span>
          {item.id==="briefs"&&state.briefs.length>0&&<span style={{fontSize:"8px",letterSpacing:"0.06em",padding:"1px 6px",background:"rgba(201,166,107,0.15)",color:"#C9A66B",fontWeight:500,borderRadius:"2px",flexShrink:0}}>{state.briefs.length}</span>}{item.id==="briefs"&&(state.watchList||[]).length>0&&<span style={{fontSize:"8px",padding:"1px 5px",background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:500,borderRadius:"2px",flexShrink:0,marginLeft:"2px"}}>{(state.watchList||[]).length}W</span>}
          {item.id==="pipeline"&&state.sites.filter(s=>!["dead","onhold"].includes(s.status)).length>0&&<span style={{fontSize:"8px",padding:"1px 6px",background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:500,borderRadius:"2px",flexShrink:0}}>{state.sites.filter(s=>!["dead","onhold"].includes(s.status)).length}</span>}
          {item.id==="invest"&&(state.investProjects||[]).length>0&&<span style={{fontSize:"8px",padding:"1px 6px",background:"rgba(129,140,248,0.12)",color:"#818cf8",fontWeight:500,borderRadius:"2px",flexShrink:0}}>{(state.investProjects||[]).length}</span>}
          {item.id==="dealmakers"&&state.dealMakers.length>0&&<span style={{fontSize:"8px",padding:"1px 6px",background:"rgba(245,241,234,0.06)",color:"rgba(245,241,234,0.3)",fontWeight:500,borderRadius:"2px",flexShrink:0}}>{state.dealMakers.length}</span>}
        </button>)}
        <div style={S.sbSecLbl}>Markets \u2014 Live</div>
        {MARKETS.filter(m=>m.launch).map(m=><div key={m.id} style={{padding:"4px 18px 4px 24px",fontSize:"10px",color:"rgba(245,241,234,0.35)",display:"flex",alignItems:"center",gap:"6px"}}><span>{m.icon}</span><span>{m.label}</span><span style={{marginLeft:"auto",fontSize:"7px",background:"rgba(201,166,107,0.12)",color:B.gold,padding:"1px 5px",letterSpacing:"0.1em"}}>LIVE</span></div>)}
        <div style={S.sbSecLbl}>Coming Soon</div>
        {MARKETS.filter(m=>!m.launch).map(m=><div key={m.id} style={{padding:"4px 18px 4px 24px",fontSize:"10px",color:"rgba(245,241,234,0.18)",display:"flex",alignItems:"center",gap:"6px"}}><span>{m.icon}</span><span>{m.label}</span></div>)}
      </div>
      <div style={{padding:"12px 18px",borderTop:`1px solid ${B.ruleN}`}}><div style={{fontSize:"8px",color:"rgba(245,241,234,0.18)",lineHeight:1.8}}>{state.sites.length} sites \u00b7 {state.dealMakers.length} deal makers<br/>{state.briefs.length} briefs \u00b7 {(state.investProjects||[]).length} invest</div></div>
    </div>

    <div style={S.main}>
      <div style={S.topbar}>
        <div style={S.topTitle}>{addingNew?"Score & Add New Site":titles[view]||view}</div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          {isAdmin&&view==="pipeline"&&!addingNew&&<button style={S.btnG} onClick={()=>{setView("score");setAddingNew(true);}}>+ Score New Site</button>}
          {addingNew&&<button style={S.btnO} onClick={()=>{setAddingNew(false);setView("pipeline");}}>Cancel</button>}
          <UserSwitcher state={state} onSwitch={u=>setState(p=>({...p,currentUser:u}))}/>
        </div>
      </div>
      <div style={S.content}>
        {(view==="score"||addingNew)&&isAdmin&&<NewSiteFlow nextId={state.nextId} onSave={site=>{saveSite(site);setView("pipeline");setAddingNew(false);}} onCancel={()=>{setView("pipeline");setAddingNew(false);}}/>}
        {!addingNew&&view==="dashboard"&&<Dashboard sites={state.sites} dealMakers={state.dealMakers} briefs={state.briefs} currentUser={state.currentUser} onOpenSite={setSelectedSite}/>}
        {!addingNew&&view==="intelligence"&&isAdmin&&<Intelligence sites={state.sites} dealMakers={state.dealMakers} briefs={state.briefs}/>}
        {!addingNew&&view==="invest"&&isAdmin&&<ParcelInvest projects={state.investProjects||[]} onSave={saveInvest} onDelete={deleteInvest}/>}
        {!addingNew&&view==="pipeline"&&<Pipeline sites={state.sites} dealMakers={state.dealMakers} currentUser={state.currentUser} onOpen={setSelectedSite} onAdd={()=>{setView("score");setAddingNew(true);}}/>}
        {!addingNew&&view==="marketplace"&&!isAdmin&&<Marketplace sites={state.sites} currentUser={state.currentUser} dealMakers={state.dealMakers} onClaim={claimSite} onOpen={setSelectedSite}/>}
        {!addingNew&&view==="briefs"&&<BuyerBriefs briefs={state.briefs} sites={state.sites} dealMakers={state.dealMakers} currentUser={state.currentUser} onSave={saveBrief} onDelete={deleteBrief} watchList={state.watchList||[]} onSaveWatch={saveWatch} onDeleteWatch={deleteWatch}/>}
        {!addingNew&&view==="dealmakers"&&isAdmin&&<DealMakers dealMakers={state.dealMakers} sites={state.sites} onSave={saveDM} onDelete={deleteDM}/>}
      </div>
    </div>

    {selectedSite&&<SiteDrawer site={selectedSite} dealMakers={state.dealMakers} currentUser={state.currentUser} briefs={state.briefs} onSave={saveSite} onDelete={deleteSite} onClaim={claimSite} onUnclaim={unclaimSite} onClose={()=>setSelectedSite(null)}/>}
  </div>;
}

</script>
<script>
var bar=document.getElementById('loading-bar');
var msg=document.getElementById('loading-msg');
function prog(p,m){bar.style.width=p+'%';if(m)msg.textContent=m;}
function showErr(e){
  var b=document.getElementById('error-box');
  b.style.display='block';
  b.textContent='Syntax error: '+e.message.slice(0,160);
  msg.textContent='Failed to load';
}
window.addEventListener('load',function(){
  prog(20,'Initialising...');
  if(typeof Babel==='undefined'){showErr({message:'Babel compiler unavailable. Check internet connection.'});return;}
  var {useState,useEffect,useCallback}=React;
  setTimeout(function(){
    try{
      prog(40,'Compiling...');
      var src=document.getElementById('app-source').textContent;
      prog(65,'Compiling...');
      var out=Babel.transform(src,{presets:['react'],filename:'app.jsx'}).code;
      prog(85,'Starting...');
      eval(out);
      prog(100,'Ready');
      setTimeout(function(){
        document.getElementById('loading').style.display='none';
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      },150);
    }catch(e){
      console.error('App load error:',e);
      showErr(e);
    }
  },50);
});
</script>
</body>
</html>
